<!--
  Sprint 2 OTP email — passwordless 6-digit code.
  Supabase template name `magic_link` is legacy; we render {{ .Token }}
  (the code) and not {{ .ConfirmationURL }} so the user types the code
  into the app instead of following a deep-link.

  Voice rules (docs/05-voice-and-claims.md):
    - Lead with the answer (the code first).
    - No urgency language ("DO NOT SHARE", caps).
    - "Talk to your doctor" pattern not relevant here, but no clinical
      language anywhere.
    - Sentence-cased headings.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light only" />
    <title>Your Leiko sign-in code</title>
  </head>
  <body
    style="margin:0;padding:0;background:#FAF6EE;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1A1F36;"
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="padding:32px 16px;"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="480"
            cellpadding="0"
            cellspacing="0"
            style="max-width:480px;background:#FFFFFF;border-radius:16px;padding:32px;"
          >
            <tr>
              <td style="font-size:14px;line-height:20px;color:#5A5F73;padding-bottom:16px;">
                Leiko
              </td>
            </tr>
            <tr>
              <td style="font-size:22px;line-height:30px;font-weight:600;padding-bottom:8px;">
                Here's your sign-in code
              </td>
            </tr>
            <tr>
              <td style="font-size:16px;line-height:24px;color:#5A5F73;padding-bottom:24px;">
                Type this in the Leiko app to sign in.
              </td>
            </tr>
            <tr>
              <td
                align="center"
                style="font-size:36px;line-height:44px;letter-spacing:8px;font-weight:700;background:#FAF6EE;border-radius:12px;padding:20px 0;font-family:Menlo,Consolas,monospace;"
              >
                {{ .Token }}
              </td>
            </tr>
            <tr>
              <td style="font-size:14px;line-height:20px;color:#5A5F73;padding-top:24px;">
                It works for the next 10 minutes.
              </td>
            </tr>
            <tr>
              <td style="font-size:14px;line-height:20px;color:#5A5F73;padding-top:8px;">
                If you didn't ask for this code, you can ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td
          align="center"
          style="font-size:12px;line-height:18px;color:#8A8FA0;padding:24px 16px 0;"
        >
          Leiko — caregiving made calmer.
        </td>
      </tr>
    </table>
  </body>
</html>
