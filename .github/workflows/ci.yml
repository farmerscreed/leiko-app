name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same branch when a newer commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint --workspace=apps/mobile

      - name: Typecheck
        run: npm run typecheck --workspace=apps/mobile

      - name: Test
        run: npm run test --workspace=apps/mobile

      # Sprint 16.6 QUA-6. Production-only audit, high+critical block
      # the build. Moderate/low transitives are tolerated because the
      # current set (postcss / jest-expo / jsdom) are all build-time
      # or test-time only — they never ship in the APK. Allowlist + a
      # remediation plan live in docs/_reference/npm-audit-allowlist.md.
      - name: Audit (production deps, high+ severity)
        run: npm audit --omit=dev --audit-level=high
