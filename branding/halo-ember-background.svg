<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <!--
    Leiko · Halo Ember — Android adaptive icon BACKGROUND layer.
    108x108. The whole canvas is painted (Android applies the mask).
    Same composition as the full master MINUS the glyph: dark gradient
    + ember bloom from the bottom + top depth shadow + top sheen.
  -->
  <defs>
    <radialGradient id="tileBgBg" cx="50%" cy="100%" r="100%">
      <stop offset="0%"  stop-color="#C96442"/>
      <stop offset="25%" stop-color="#E8A063" stop-opacity="0.5"/>
      <stop offset="65%" stop-color="#1A1614"/>
      <stop offset="100%" stop-color="#0A0907"/>
    </radialGradient>
    <linearGradient id="topShadowBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="bottomGlowBg" cx="50%" cy="100%" r="70%">
      <stop offset="0%"  stop-color="#E8A063" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#E8A063" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="topSheenBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FBF8F3" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#FBF8F3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="108" height="108" fill="url(#tileBgBg)"/>
  <rect x="0" y="0" width="108" height="108" fill="url(#bottomGlowBg)"/>
  <rect x="0" y="0" width="108" height="43" fill="url(#topShadowBg)"/>
  <ellipse cx="54" cy="18" rx="38" ry="16" fill="url(#topSheenBg)"/>
</svg>
